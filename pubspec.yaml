name: rsvp_flutter_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  bloc: ^9.2.0
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  drift: ^2.32.1
  equatable: ^2.0.0
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  json_annotation: ^4.11.0
  logger: ^2.7.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.42
  syncfusion_flutter_pdf: ^33.1.46
  theme_tailor_annotation: ^3.1.3
  uuid: ^4.5.3
  widgetbook: ^3.22.0
  widgetbook_annotation: ^3.11.0

dev_dependencies:
  bloc_lint: ^0.4.0
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.1
  theme_tailor: ^3.1.3
  very_good_analysis: ^10.2.0
  widgetbook_generator: ^3.22.0

flutter:
  uses-material-design: true

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
